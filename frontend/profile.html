<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="mb-4">

My Profile

</h2>

<form id="profileForm">

<input class="form-control mb-3" id="age" type="number" placeholder="Age" required>

<select class="form-select mb-3" id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<input class="form-control mb-3" id="occupation" placeholder="Occupation" required>

<input class="form-control mb-3" id="budget" type="number" placeholder="Budget" required>

<input class="form-control mb-3" id="food_preference" placeholder="Food Preference">

<select class="form-select mb-3" id="smoking">
<option>No</option>
<option>Yes</option>
</select>

<select class="form-select mb-3" id="drinking">
<option>No</option>
<option>Yes</option>
</select>

<select class="form-select mb-3" id="pets">
<option>No</option>
<option>Yes</option>
</select>

<input class="form-control mb-3" id="sleep_schedule" placeholder="Sleep Schedule">

<input class="form-control mb-3" id="cleanliness" placeholder="Cleanliness">

<input class="form-control mb-3" id="languages" placeholder="Languages">

<textarea class="form-control mb-3" id="bio" placeholder="Bio"></textarea>

<button class="btn btn-primary w-100">

Save Profile

</button>

</form>

</div>

</div>

<script src="js/profile.js"></script>

</body>

</html>
