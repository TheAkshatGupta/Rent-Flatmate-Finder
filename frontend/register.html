<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-md-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">
Register
</h2>

<form id="registerForm">

<input class="form-control mb-3" id="full_name" placeholder="Full Name" required>

<input class="form-control mb-3" id="email" type="email" placeholder="Email" required>

<input class="form-control mb-3" id="phone" placeholder="Phone">

<input class="form-control mb-3" id="password" type="password" placeholder="Password" required>

<select class="form-select mb-3" id="role">

<option value="tenant">Tenant</option>

<option value="owner">Owner</option>

</select>

<button class="btn btn-primary w-100">

Register

</button>

</form>

<p class="mt-3 text-center">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

</div>

</div>

</div>

<script src="js/register.js"></script>

</body>

</html>
