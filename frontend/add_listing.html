<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Listing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="mb-4">

Add New Listing

</h2>

<form id="listingForm">

<input class="form-control mb-3" id="title" placeholder="Title" required>

<textarea class="form-control mb-3" id="description" placeholder="Description" required></textarea>

<input class="form-control mb-3" id="rent" type="number" placeholder="Rent" required>

<input class="form-control mb-3" id="city" placeholder="City" required>

<input class="form-control mb-3" id="area" placeholder="Area" required>

<input class="form-control mb-3" id="property_type" placeholder="Property Type" required>

<input class="form-control mb-3" id="owner_name" placeholder="Owner Name" required>

<input class="form-control mb-3" id="owner_phone" placeholder="Owner Phone" required>

<button class="btn btn-success w-100">

Add Listing

</button>

</form>

</div>

</div>

<script src="js/add_listing.js"></script>

</body>

</html>
